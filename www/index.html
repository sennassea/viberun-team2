<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c1422">
<link rel="manifest" href="manifest.json">
<title>신입 액소시스트 - 전투 프로토타입</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="life-ui.css">
<link rel="stylesheet" href="map.css">
<link rel="stylesheet" href="mapUI.css">
<link rel="stylesheet" href="hand-layout.css">
</head>
<body>

<div id="stageWrap">
  <div id="game">
    <div class="bokeh" style="width:18cqh;height:18cqh;left:14%;top:18%"></div>
    <div class="bokeh" style="width:12cqh;height:12cqh;right:18%;top:30%"></div>

    <div id="startScreen" class="start-screen">
      <div class="start-logo" aria-label="귀로 - 돌아가는 길">
        <div class="start-logo-main">귀로</div>
        <div class="start-logo-sub">돌아가는 길</div>
      </div>
      <div class="start-menu" aria-label="시작 메뉴">
        <button type="button" class="start-menu-button start-new-game">새 게임</button>
        <button type="button" class="start-menu-button start-continue-game">
          <span class="start-menu-label">이어하기</span>
          <span class="continue-status">로비</span>
        </button>
        <div class="start-menu-row split">
          <button type="button" class="start-menu-button start-codex-button">도감</button>
          <button type="button" class="start-menu-button start-record-button">기록</button>
        </div>
        <button type="button" class="start-menu-button start-settings-button">설정</button>
      </div>
    </div>

    <!-- 상단 HUD -->
    <div class="top-hud">
      <div id="hud">
        <div class="hud-card player-info-card">
          <div class="portrait" id="hudPortrait">👼</div>
          <div class="player-info-body">
            <div class="who"><b id="hudName">빛솔이</b><span id="hudTitle">신입 액소시스트</span></div>
            <div class="hud-hp-row"><span class="hud-hp-label">정신력</span><span id="hudHp">60/60</span></div>
            <div class="hud-hpbar"><div id="hudHpFill"></div></div>
            <div class="hud-resource-row" aria-label="보유 자원">
              <span class="hud-resource"><span class="hud-resource-icon">🏺</span><span id="hudRelicCount">0</span></span>
              <span class="hud-resource"><span class="hud-resource-icon">🧪</span><span id="hudPotionCount">0</span></span>
              <span class="hud-resource"><span class="hud-resource-icon">🪙</span><span id="hudGold">120</span></span>
              <span class="hud-resource"><span class="hud-resource-icon">🌙</span><span id="hudMoonShard">0</span></span>
            </div>
          </div>
        </div>
        <div id="profileStatusEffects" class="profile-status-effects" aria-label="플레이어 상태이상"></div>
        <div class="progress-center-hud" aria-label="진행 정보">
          <div class="progress-region"><span class="progress-icon">🏥</span><span>병원</span></div>
          <div class="progress-separator"></div>
          <div class="progress-floor" id="hudFloor">1F</div>
          <div class="progress-separator"></div>
          <div class="progress-turn" id="hudTurn"><span id="hudTurnNum">1</span>턴</div>
        </div>
        <div class="spacer"></div>
        <div class="top-right-menu" aria-label="상단 메뉴">
          <div class="hud-card hud-btn top-menu-button">🗺️<span class="sr-only">병원 지도</span></div>
          <div class="hud-card hud-btn stat top-menu-button" id="deckViewerButton">📖 <span id="hudDeck">18</span></div>
          <div class="hud-card hud-btn top-menu-button">⚙️</div>
        </div>
      </div>
    </div>
    <div class="left-side-hud">
      <div class="left-side-main">
        <div id="energy" class="vertical-energy-panel">
          <span class="lbl">신통력</span>
          <div class="energy-orbs" aria-hidden="true">
            <span class="energy-slot active"></span>
            <span class="energy-slot active"></span>
            <span class="energy-slot active"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
          </div>
          <span class="val">3/3</span>
        </div>
        <div class="side-item-panel" aria-label="유물과 포션">
          <div class="side-item-section">
            <div class="side-item-title">유물</div>
            <div id="sideRelicSlots" class="side-item-slots" aria-label="보유 유물"></div>
          </div>
          <div class="side-item-section">
            <div class="side-item-title">포션</div>
            <div id="sidePotionSlots" class="side-item-slots" aria-label="보유 포션"></div>
          </div>
        </div>
      </div>
      <div id="effects" class="side"><h3>현재 효과</h3><div id="effList"></div></div>
    </div>

    <div class="battle-field">
      <div id="intents" class="side"><h3>적 행동 의도</h3><div id="intentList"></div></div>
      <div id="field"></div>
    </div>

    <!-- 하단 도크 -->
    <div id="dock">
      <div class="card-hand-area">
        <div id="hand"></div>
      </div>
      <div class="right-bottom-actions">
        <button id="endTurn">턴 종료</button>
        <div class="pile" id="deckPile"><div class="stack" id="deckCount">18</div><div class="plbl">덱</div></div>
        <div class="pile" id="discardPile"><div class="stack" id="discardCount">0</div><div class="plbl">버린 카드</div></div>
      </div>
    </div>
    <div id="hint">✦ 카드를 드래그하여 <span class="r">적</span> 또는 <span class="b">자신</span>에게 사용하세요!</div>

    <div id="fx"></div>
    <div id="aim"></div>
    <div id="dragClone" style="display:none"></div>
    <div id="toast"></div>

    <!-- 종료 오버레이 -->
    <div id="over"><div class="over-box">
      <h2 id="overTitle"></h2><p id="overDesc"></p>
      <button id="restart">다시 시작</button>
      <button id="returnStart">시작 화면으로</button>
    </div></div>
  </div>
</div>

<!-- 모바일 세로 안내 -->
<div id="rotate"><div><div class="ico">📱</div><p>기기를 가로로 돌려주세요</p></div></div>

<!-- 캐릭터/몬스터/라이프는 충돌 방지를 위해 독립 파일로 먼저 로드 -->
<script src="characterData.js" defer></script>
<script src="monsterData.js" defer></script>
<script src="mobileAppGuard.js" defer></script>
<script src="lifeSystem.js" defer></script>
<script src="cardData.js" defer></script>
<script src="script.js" defer></script>
<script src="runRecord.js" defer></script>
<script src="startMenu.js" defer></script>
<script src="tooltip.js" defer></script>
<script src="deckViewer.js" defer></script>
<script src="settingsViewer.js" defer></script>
<script src="mapSystem.js" defer></script>
<script src="encounterPackages.js" defer></script>
<script src="mapNodeLogic.js" defer></script>
<script src="mapUI.js" defer></script>
<script src="restNode.js" defer></script>
<script src="hand-layout.js" defer></script>
</body>
</html>
