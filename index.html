<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c1422">
<link rel="manifest" href="manifest.json">
<title>신입 액소시스트 - 전투 프로토타입</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="life-ui.css">
<link rel="stylesheet" href="map.css">
<link rel="stylesheet" href="mapUI.css">
<link rel="stylesheet" href="hand-layout.css">
<link rel="stylesheet" href="eventNode.css">
<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="mailbox.css">
<link rel="stylesheet" href="wallet.css">
<link rel="stylesheet" href="bmStore.css">
<link rel="stylesheet" href="monthlyPass.css">
<link rel="stylesheet" href="menuProfile.css">
<link rel="stylesheet" href="spiritPath.css">
<link rel="stylesheet" href="globalTooltip.css">

<!-- 반드시 모든 CSS 중 가장 마지막에 로드 -->
<link rel="stylesheet" href="font-theme.css">
</head>
<body>

<div id="stageWrap">
  <div id="game">
    <div id="battleBg" class="battle-bg" aria-hidden="true"></div>
    <div class="bokeh" style="width:18cqh;height:18cqh;left:14%;top:18%"></div>
    <div class="bokeh" style="width:12cqh;height:12cqh;right:18%;top:30%"></div>

    <div id="startScreen" class="start-screen">
      <div class="menu-profile" hidden>
        <button type="button" class="menu-profile-avatar-btn" aria-label="프로필 아이콘 선택">
          <img class="menu-profile-avatar" src="assets/profile/profile_default.png" alt="">
        </button>

        <div class="menu-profile-info">
          <div class="menu-profile-name">빛솔이</div>
        </div>

        <div class="menu-profile-popup" hidden>
          <button type="button" class="menu-profile-option is-default" data-skin-id="">
            <img src="assets/profile/profile_default.png" alt="">
            <span>기본</span>
          </button>
        </div>
      </div>

      <div class="start-logo" aria-label="혼꽃 - SPIRIT BLOSSOM">
        <div class="start-logo-main">혼꽃</div>
        <div class="start-logo-sub">SPIRIT BLOSSOM</div>
      </div>
      <div class="start-menu" aria-label="시작 메뉴">
        <button type="button" class="start-menu-button start-tutorial-button">📖 튜토리얼</button>
        <button type="button" class="start-menu-button start-new-game">새 게임</button>
        <button type="button" class="start-menu-button start-continue-game">
          <span class="start-menu-label">이어하기</span>
          <span class="continue-status">신령의 은혜</span>
        </button>
        <div class="start-menu-row split">
          <button type="button" class="start-menu-button start-codex-button">도감</button>
          <button type="button" class="start-menu-button start-record-button">기록</button>
        </div>
        <button type="button" class="start-menu-button start-settings-button">설정</button>
      </div>
      <button type="button" class="start-mailbox-button mailbox-trigger-button" hidden aria-label="선물함">
        <span class="start-mailbox-icon" aria-hidden="true">🎁</span>
        <span class="start-mailbox-label">선물함</span>
        <span class="mailbox-badge" hidden>0</span>
      </button>
      <button type="button" class="start-moon-wallet" hidden aria-label="달빛조각 보유량">
        <span class="start-moon-icon" aria-hidden="true">🌙</span>
        <span class="start-moon-count">0</span>
        <span class="start-moon-plus" aria-hidden="true">＋</span>
      </button>

      <div class="monthly-pass-claim-card" hidden>
        <div class="monthly-pass-claim-emblem">☾</div>

        <div class="monthly-pass-claim-dday">D-0</div>

        <div class="monthly-pass-claim-title">월영의 약속</div>

        <div class="monthly-pass-claim-divider"></div>

        <div class="monthly-pass-claim-subtitle">오늘의 보상</div>

        <div class="monthly-pass-claim-reward">
          <span class="monthly-pass-claim-icon">🌙</span>
          <span class="monthly-pass-claim-text">달빛조각 x15</span>
        </div>

        <button type="button" class="monthly-pass-claim-button">
          받기
        </button>
      </div>
    </div>

    <!-- 상단 HUD -->
    <div class="top-hud">
      <div id="hud">
        <div class="hud-card player-info-card">
          <div class="portrait" id="hudPortrait">👼</div>
          <div class="player-info-body">
            <div class="who"><b id="hudName">빛솔이</b><span id="hudTitle">신입 액소시스트</span></div>
            <div class="hud-hp-row">
              <div class="hud-hpbar"><div id="hudHpFill"></div><span id="hudHp">60/60</span></div>
            </div>
            <div class="hud-resource-row" aria-label="보유 자원">
              <span class="hud-resource"><span class="hud-resource-icon hud-resource-icon-relic">🏺</span><span id="hudRelicCount">0</span></span>
              <span class="hud-resource"><span class="hud-resource-icon hud-resource-icon-potion">🧪</span><span id="hudPotionCount">0</span></span>
              <span class="hud-resource"><span class="hud-resource-icon hud-resource-icon-gold" aria-hidden="true"></span><span id="hudGold">120</span></span>
              <span class="hud-resource" style="display:none"><span class="hud-resource-icon hud-resource-icon-moon">🌙</span><span id="hudMoonShard">0</span></span>
            </div>
          </div>
        </div>
        <div id="profileStatusEffects" class="profile-status-effects" aria-label="플레이어 상태이상"></div>
        <div class="progress-center-hud" aria-label="진행 정보">
          <div class="progress-region"><span class="progress-icon">🏥</span><span>병원</span></div>
          <div class="progress-separator"></div>
          <div class="progress-floor" id="hudFloor">1F</div>
          <div class="progress-separator"></div>
          <div class="progress-turn" id="hudTurn"><span id="hudTurnNum">1</span>턴</div>
        </div>
        <div class="spacer"></div>
        <div class="top-right-menu" aria-label="상단 메뉴">
          <div class="hud-card hud-btn top-menu-button ui-asset-button ui-map-button">🗺️<span class="sr-only">여정</span></div>
          <div class="hud-card hud-btn top-menu-button ui-asset-button ui-codex-button" id="deckViewerButton">📖 <span id="hudDeck">18</span><span class="sr-only">도감</span></div>
          <div class="hud-card hud-btn top-menu-button ui-asset-button ui-bag-button" id="bagViewerButton">🎒<span class="sr-only">가방</span></div>
          <div class="hud-card hud-btn top-menu-button ui-asset-button ui-settings-button">⚙️</div>
        </div>
      </div>
    </div>
    <div class="top-relic-panel" aria-label="보유 법구">
      <div class="side-item-title">법구</div>
      <div id="sideRelicSlots" class="side-item-slots" aria-label="보유 법구"></div>
    </div>
    <div class="left-side-hud">
      <div class="left-side-main">
        <div id="energy" class="vertical-energy-panel">
          <div class="energy-orbs" aria-hidden="true">
            <span class="energy-slot active"></span>
            <span class="energy-slot active"></span>
            <span class="energy-slot active"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
            <span class="energy-slot empty"></span>
          </div>
          <span class="val">3/3</span>
        </div>
        <div class="side-item-panel" aria-label="법구와 약병">
          <div class="side-item-section">
            <div class="side-item-title">약병</div>
            <div id="sidePotionSlots" class="side-item-slots" aria-label="보유 약병"></div>
          </div>
        </div>
      </div>
      <div id="effects" class="side"><h3>현재 효과</h3><div id="effList"></div></div>
    </div>

    <div class="battle-field">
      <div id="intents" class="side"><h3>적 행동 의도</h3><div id="intentList"></div></div>
      <div id="field"></div>
    </div>

    <!-- 하단 도크 -->
    <div id="dock">
      <div class="card-hand-area">
        <div id="hand"></div>
      </div>
      <div class="right-bottom-actions">
        <button id="endTurn">턴 종료</button>
        <div class="pile exhaust-pile" id="exhaustPile"><div class="stack" id="exhaustCount"></div><div class="plbl">소멸 주문</div></div>
        <div class="pile" id="deckPile"><div class="stack" id="deckCount">18</div><div class="plbl">덱</div></div>
        <div class="pile" id="discardPile"><div class="stack" id="discardCount">0</div><div class="plbl">버린 주문</div></div>
      </div>
    </div>
    <div id="hint">✦ 주문을 드래그하여 <span class="r">적</span> 또는 <span class="b">자신</span>에게 사용하세요!</div>

    <div id="fx"></div>
    <div id="aim"></div>
    <div id="dragClone" style="display:none"></div>

    <!-- 종료 오버레이 -->
    <div id="over"><div class="over-box">
      <h2 id="overTitle"></h2><p id="overDesc"></p>
      <button id="restart">다시 시작</button>
      <button id="returnStart">시작 화면으로</button>
    </div></div>
  </div>
</div>

<!-- 닉네임 변경 모달: 메인화면/전투화면 프로필 공통 사용 -->
<div class="nickname-modal" hidden>
  <div class="nickname-modal-backdrop"></div>

  <section class="nickname-modal-panel" role="dialog" aria-modal="true" aria-labelledby="nicknameModalTitle">
    <h2 id="nicknameModalTitle" class="nickname-modal-title">닉네임 변경</h2>

    <p class="nickname-modal-desc">닉네임은 2~8글자까지 설정할 수 있습니다.</p>

    <input type="text" class="nickname-modal-input" maxlength="16" autocomplete="off" placeholder="닉네임 입력">

    <p class="nickname-modal-error" hidden></p>

    <div class="nickname-modal-actions">
      <button type="button" class="nickname-modal-cancel">취소</button>
      <button type="button" class="nickname-modal-confirm">변경</button>
    </div>
  </section>
</div>

<!-- 모바일 세로 안내 -->
<div id="rotate"><div><div class="ico">📱</div><p>기기를 가로로 돌려주세요</p></div></div>

<!-- 전역 토스트 레이어: 어떤 모달/오버레이보다도 위에 표시되어야 하므로 body 최상위에 위치합니다 -->
<div id="global-toast-layer" class="global-toast-layer" aria-live="polite" aria-atomic="true"></div>

<!-- 전역 토스트 서비스는 다른 모든 UI 스크립트보다 먼저 로드되어야 합니다 -->
<script src="toastService.js" defer></script>
<script src="soundConfig.js" defer></script>
<script src="soundManager.js" defer></script>

<!-- 캐릭터/몬스터/라이프는 충돌 방지를 위해 독립 파일로 먼저 로드 -->
<script src="characterData.js" defer></script>
<script src="monsterData.js" defer></script>
<script src="mobileAppGuard.js" defer></script>
<script src="lifeSystem.js" defer></script>
<script src="balanceData.js" defer></script>
<script src="equipment.js" defer></script>
<script src="PotionData.js" defer></script>
<script src="cardData.js" defer></script>
<script src="eventData.js" defer></script>
<script src="rarityLabelColor.js" defer></script>
<!-- 전투 씬(구 script.js)은 기능별로 분리되어 있으며, 서로 참조하므로 이 순서를 유지해야 합니다 -->
<script src="battleInit.js" defer></script>
<script src="battleRunState.js" defer></script>
<script src="relicSystem.js" defer></script>
<script src="monsterAI.js" defer></script>
<script src="statusEffectSystem.js" defer></script>
<script src="cardPlaySystem.js" defer></script>
<script src="battleRewards.js" defer></script>
<script src="turnCycle.js" defer></script>
<script src="battleRender.js" defer></script>
<script src="potionBattleUI.js" defer></script>
<script src="battleDragDrop.js" defer></script>
<script src="battleFeedback.js" defer></script>
<script src="runRecord.js" defer></script>
<script src="authService.js" defer></script>
<script src="loginModal.js" defer></script>
<script src="mailboxService.js" defer></script>
<script src="walletService.js" defer></script>
<script src="bmStoreData.js" defer></script>
<script src="bmStoreService.js" defer></script>
<script src="nicknameUI.js" defer></script>
<script src="bmStoreUI.js" defer></script>
<script src="mailboxUI.js" defer></script>
<script src="walletUI.js" defer></script>
<script src="monthlyPassUI.js" defer></script>
<script src="menuProfileUI.js" defer></script>
<script src="spiritPathUI.js" defer></script>
<script src="startMenu.js" defer></script>
<script src="tutorialDialogueData.js" defer></script>
<script src="tutorialSystem.js" defer></script>
<script src="tutorialBattle.js" defer></script>
<script src="globalTooltip.js" defer></script>
<script src="tooltip.js" defer></script>
<script src="deckViewer.js" defer></script>
<script src="settingsViewer.js" defer></script>
<script src="mapSystem.js" defer></script>
<script src="tutorialMapSystem.js" defer></script>
<script src="encounterPackages.js" defer></script>
<script src="mapNodeLogic.js" defer></script>
<script src="mapUI.js" defer></script>
<script src="restNode.js" defer></script>
<script src="bagUI.js" defer></script>
<script src="shopNode.js" defer></script>
<script src="eventNode.js" defer></script>
<script src="runResultData.js" defer></script>
<script src="startBlessing.js" defer></script>
<script src="runResult.js" defer></script>
<script src="hand-layout.js" defer></script>
<script src="cheatConsole.js" defer></script>
<script src="cheatMonster.js" defer></script>
<script src="cheatEvent.js" defer></script>
</body>
</html>
